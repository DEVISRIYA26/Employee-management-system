<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee DBMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 50px;
        }

        .navbar-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
        }

        .hero-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            margin-top: 30px;
            border-top: 5px solid #667eea;
        }

        .hero-section h1 {
            color: #2d3748;
            font-weight: 700;
        }

        .hero-section p {
            color: #718096;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .action-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-top: 30px;
        }

        .btn-custom {
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-add {
            background-color: #667eea;
            color: white;
            border: none;
        }

        .btn-add:hover {
            background-color: #5a6ed0;
            color: white;
        }

        .btn-all {
            background-color: #4299e1;
            color: white;
            border: none;
        }

        .btn-all:hover {
            background-color: #3182ce;
            color: white;
        }

        .btn-male {
            background-color: #48bb78;
            color: white;
            border: none;
        }

        .btn-male:hover {
            background-color: #38a169;
            color: white;
        }

        .btn-female {
            background-color: #ed64a6;
            color: white;
            border: none;
        }

        .btn-female:hover {
            background-color: #d53f8c;
            color: white;
        }

        .search-container {
            position: relative;
        }

        .search-box {
            border-radius: 50px;
            padding: 12px 25px 12px 45px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .search-box:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            margin-top: 30px;
        }

        .table-custom {
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: -8px;
        }

        .table-custom thead th {
            border-bottom: none;
            color: #718096;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 10px 15px;
            font-weight: 600;
        }

        .table-custom tbody tr {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        .table-custom tbody tr:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08);
            z-index: 1;
            position: relative;
            background-color: #fcfcfc;
        }

        .table-custom tbody td {
            border-top: 1px solid #edf2f7;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            padding: 18px 15px;
            color: #4a5568;
        }

        .table-custom tbody td:first-child {
            border-left: 1px solid #edf2f7;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            font-weight: bold;
            color: #667eea;
        }

        .table-custom tbody td:last-child {
            border-right: 1px solid #edf2f7;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 15px;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Generate different avatar colors */
        .color-1 {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }

        .color-2 {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .color-3 {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .color-4 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .color-5 {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        .badge-male {
            background-color: rgba(72, 187, 120, 0.15);
            color: #2f855a;
            border: 1px solid rgba(72, 187, 120, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-female {
            background-color: rgba(237, 100, 166, 0.15);
            color: #b83280;
            border: 1px solid rgba(237, 100, 166, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .action-btn {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-person-bounding-box fs-2 me-3"></i>
                <h1 class="text-white mb-0 fs-3 fw-bold tracking-tight">Employee DBMS</h1>
            </a>
            <div class="text-white opacity-75 d-none d-md-block">
                <i class="bi bi-clock me-1"></i> <span id="current-date"></span>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="row align-items-center">
                <div class="col-lg-8 mb-4 mb-lg-0">
                    <h2 class="mb-3">Welcome to your <span class="text-primary">Dashboard</span> <i
                            class="bi bi-stars text-warning"></i></h2>
                    <p>Manage, track, and update employee records with this secure and scalable HR infrastructure.
                        Navigate through profiles seamlessly and maintain an organized workspace.</p>
                </div>
                <div class="col-lg-4 text-lg-end text-center">
                    <button class="btn btn-custom btn-add shadow px-4 py-3">
                        <i class="bi bi-person-plus-fill me-2 fs-5 align-middle"></i>
                        <span class="align-middle">Add Employee</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Filters & Search Section -->
        <section class="action-card">
            <div class="row align-items-center">
                <div class="col-md-7 mb-3 mb-md-0">
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-custom btn-all flex-grow-1 py-2" id="all-emp">
                            <i class="bi bi-people-fill me-2"></i>All Staff
                        </button>
                        <button class="btn btn-custom btn-male flex-grow-1 py-2" id="male-emp">
                            <i class="bi bi-gender-male me-2"></i>Male
                        </button>
                        <button class="btn btn-custom btn-female flex-grow-1 py-2" id="female-emp">
                            <i class="bi bi-gender-female me-2"></i>Female
                        </button>
                    </div>
                </div>
                <!-- Search Box -->
                <div class="col-md-5">
                    <div class="search-container">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" class="form-control search-box" placeholder="Search by name..." id="search">
                    </div>
                </div>
            </div>
        </section>

        <!-- Data Table Section -->
        <section class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 text-dark fw-bold"><i class="bi bi-list-ul me-2 text-primary"></i>Employee Directory
                </h4>
                <div class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fs-6" id="emp-count">
                    0 Employees
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom align-middle mb-0">
                    <thead>
                        <tr>
                            <th width="8%">Emp ID</th>
                            <th width="32%">Employee Name</th>
                            <th width="28%">Email Address</th>
                            <th width="15%">Gender</th>
                            <th width="12%" class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="display">
                        <!-- Employee rows will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Script references -->
    <script src="script-EBMS.js"></script>
    <script src="script.js"></script>
</body>

</html>
